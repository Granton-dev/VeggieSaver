<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GardenAI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --accent: #52b788;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--green-dark);
    background-image: radial-gradient(ellipse at 20% 50%, rgba(64,145,108,0.3) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(82,183,136,0.2) 0%, transparent 50%);
  }
  .auth-card {
    background: #fff;
    border-radius: 20px;
    padding: 2.75rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: 1.75rem;
  }
  .brand-icon { font-size: 2.2rem; }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--green-dark);
    line-height: 1;
  }
  .brand-sub { font-size: .8rem; color: #6b8c7a; margin-top: .15rem; }
  h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--green-dark); margin-bottom: .25rem; }
  .subtitle { color: #6b8c7a; font-size: .875rem; margin-bottom: 1.75rem; }
  .form-label { font-weight: 600; font-size: .825rem; color: var(--green-dark); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
  .form-control {
    border: 1.5px solid #d1e0d8;
    border-radius: 10px;
    padding: .65rem 1rem;
    font-size: .9rem;
    transition: border .2s, box-shadow .2s;
  }
  .form-control:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    outline: none;
  }
  .btn-login {
    width: 100%;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .75rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: .5rem;
  }
  .btn-login:hover { background: var(--green-light); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .divider { text-align: center; color: #aac4b5; font-size: .8rem; margin: 1.25rem 0; }
  .register-link { text-align: center; font-size: .875rem; color: #6b8c7a; }
  .register-link a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
  .register-link a:hover { text-decoration: underline; }
  .alert-error {
    background: #fadbd8;
    border: 1px solid #e74c3c;
    border-radius: 8px;
    padding: .65rem 1rem;
    color: #922b21;
    font-size: .875rem;
    margin-bottom: 1rem;
  }
  .leaf-decoration {
    position: fixed;
    font-size: 8rem;
    opacity: .04;
    pointer-events: none;
  }
  .leaf-1 { top: -2rem; left: -2rem; transform: rotate(-20deg); }
  .leaf-2 { bottom: -2rem; right: -2rem; transform: rotate(160deg); }
</style>
</head>
<body>
<div class="leaf-decoration leaf-1">🌿</div>
<div class="leaf-decoration leaf-2">🌿</div>

<div class="auth-card">
  <div class="brand">
    <span class="brand-icon">🌱</span>
    <div>
      <div class="brand-name">GardenAI</div>
      <div class="brand-sub">Smart Vegetable Garden Manager</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your garden dashboard</p>

  {% if messages %}
    {% for msg in messages %}
    <div class="alert-error">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>

  <div class="divider">— or —</div>
  <p class="register-link">
    Don't have an account? <a href="{% url 'register' %}">Create one free</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
